databaseChangeLog:
  - changeSet:
      id: 20260311-1
      author: Michal
      changes:
        - createTable:
            tableName: producer
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_producer
                    referencedTableName: producer
                    referencedColumnNames: id

        - createTable:
            tableName: product_attribute
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: attr_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: attr_value
                  type: TEXT
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_attribute_product
                    referencedTableName: product
                    referencedColumnNames: id
                    deleteCascade: true

        - createIndex:
            tableName: product_attribute
            indexName: idx_attr_product_id
            columns:
              - column:
                  name: product_id